<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f2">
  <title>A message to you!</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="shell-header">
      <div class="brand">A message to you!</div>
      <button id="homeButton" class="ghost small hidden" type="button">Home</button>
    </header>

    <main>
      <section id="screen-home" class="screen active">
        <div class="hero">
          <h1>A message to you!</h1>
          <p>レイアウトを選んで、各Roomに作品や画像を配置します。完成したらHTMLとして保存し、そのまま相手に送ることができます。</p>
        </div>

        <div class="format-grid">
          <button class="format-card" data-format="1" type="button">
            <div class="mini-grid one"><span></span></div>
            <div class="format-title">1 Room</div>
          </button>
          <button class="format-card" data-format="3" type="button">
            <div class="mini-grid three"><span></span><span></span><span></span></div>
            <div class="format-title">3 Rooms</div>
          </button>
          <button class="format-card" data-format="9" type="button">
            <div class="mini-grid nine">
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
            </div>
            <div class="format-title">9 Rooms</div>
          </button>
        </div>
      </section>

      <section id="screen-editor" class="screen">
        <div class="toolbar-row top-row">
          <div id="formatLabel" class="format-label">9 Rooms</div>
          <div class="top-actions">
            <button id="changeFormatButton" class="ghost small" type="button">Format</button>
            <button id="exportButton" class="ghost small" type="button">Export JSON</button>
            <label class="ghost small import-label">Import JSON<input id="importInput" type="file" accept="application/json"></label>
          </div>
        </div>

        <div id="canvasWrap" class="canvas-wrap"></div>

        <div class="toolbar-row bottom-row">
          <button id="swapModeButton" class="ghost" type="button">Swap</button>
          <button id="removeButton" class="ghost" type="button">Remove</button>
          <button id="clearButton" class="ghost" type="button">Clear</button>
          <button id="libraryButton" class="ghost" type="button">Library</button>
          <button id="downloadHtmlButton" class="primary" type="button">Download HTML</button>
          <button id="sendHtmlButton" class="ghost" type="button">Send HTML</button>
        </div>
      </section>

      <section id="screen-app" class="screen">
        <div class="toolbar-row top-row">
          <div class="format-label" id="appScreenLabel">App Room</div>
          <div class="top-actions">
            <button id="useInRoomButton" class="primary small" type="button">USE IN ROOM</button>
            <button id="appBackButton" class="ghost small" type="button">Back</button>
          </div>
        </div>
        <div class="app-shell">
          <iframe id="appFrame" class="app-frame" title="App Room" allow="camera; microphone; clipboard-read; clipboard-write"></iframe>
        </div>
      </section>
    </main>
  </div>

  <dialog id="appPickerDialog" class="sheet-dialog">
    <form method="dialog" class="sheet">
      <div class="sheet-head">
        <div>
          <h2>Select App</h2>
          <p id="pickerRoomLabel">Room 1</p>
        </div>
        <button class="ghost small" value="cancel">Close</button>
      </div>
      <div id="appList" class="app-list"></div>
    </form>
  </dialog>

  <dialog id="choiceDialog" class="sheet-dialog">
    <form method="dialog" class="sheet narrow">
      <div class="sheet-head">
        <div>
          <h2 id="choiceTitle">Haiku</h2>
          <p id="choiceSubtitle">How do you want to use this room?</p>
        </div>
        <button class="ghost small" value="cancel">Close</button>
      </div>
      <div class="choice-buttons grid-actions">
        <button id="newButton" class="primary" type="button">New</button>
        <button id="libraryPickButton" class="ghost" type="button">Library</button>
        <button id="saveRoomJpegButton" class="ghost hidden" type="button">Save Room JPEG</button>
        <button id="removeRoomButton" class="ghost danger hidden" type="button">Remove</button>
      </div>
    </form>
  </dialog>

  <dialog id="editorDialog" class="sheet-dialog">
    <form method="dialog" class="sheet narrow editor-sheet">
      <div class="sheet-head">
        <div>
          <h2 id="editorTitle">Edit Room</h2>
          <p id="editorAppLabel">SMALL MEMORY</p>
        </div>
        <button class="ghost small" value="cancel">Close</button>
      </div>
      <label class="field">
        <span>Title</span>
        <input id="roomTitleInput" type="text" maxlength="60" placeholder="Optional title">
      </label>
      <label class="field">
        <span>Note</span>
        <textarea id="roomNoteInput" rows="4" maxlength="220" placeholder="Short note"></textarea>
      </label>
      <div class="choice-buttons single">
        <button id="saveRoomButton" class="primary" type="button">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="libraryDialog" class="sheet-dialog">
    <form method="dialog" class="sheet">
      <div class="sheet-head">
        <div>
          <h2 id="libraryTitle">Library</h2>
          <p>保存した room 素材から選びます。</p>
        </div>
        <button class="ghost small" value="cancel">Close</button>
      </div>
      <div id="libraryList" class="library-list"></div>
    </form>
  </dialog>

  <dialog id="passwordDialog" class="sheet-dialog">
    <form method="dialog" class="sheet narrow">
      <div class="sheet-head">
        <div>
          <h2>Locked App</h2>
          <p>AI room に入るにはパスワードが必要です。</p>
        </div>
        <button class="ghost small" value="cancel">Close</button>
      </div>
      <label class="field">
        <span>Password</span>
        <input id="passwordInput" type="password" placeholder="Password">
      </label>
      <p id="passwordError" class="error-text hidden">Password is incorrect.</p>
      <div class="choice-buttons single">
        <button id="unlockButton" class="primary" type="button">Unlock</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>

  <dialog id="previewDialog" class="preview-dialog">
    <div class="preview-shell">
      <button id="previewCloseButton" class="preview-close" type="button" aria-label="Close">×</button>
      <div id="previewStage" class="preview-stage"></div>
    </div>
  </dialog>

</body>
</html>
