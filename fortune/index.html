  function stableSeed(str) {
    var h = 1779033703 ^ str.length;
    for (var i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = (h ^ (h >>> 16)) >>> 0;
    return h;
  }

  function makeRng(seed) {
    var a = seed >>> 0;
    return function () {
      a |= 0;
      a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;

function gradeFromScore(score) {
    if (score >= 75) return 'a';
    if (score >= 45) return 'b';
    return 'c';
  }

  // 日付ごと・人ごとに、ある程度ばらけた文章を選ぶ
  
  var MESSAGE_SCHEDULE_CACHE = {};

  function isLeapYear(year) {
    return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
  }

  function dayOfYear(date) {
    var start = new Date(date.getFullYear(), 0, 1);
    var diff = date - start;
    return Math.floor(diff / 86400000); // 0-based
  }

  function ensureMessageSchedule(birthStr, category, grade, year) {
    var key = (birthStr || 'none') + '|' + category + '|' + grade + '|' + year;
    if (MESSAGE_SCHEDULE_CACHE[key]) return MESSAGE_SCHEDULE_CACHE[key];

    var bank = (TEXT_BANK[category] && TEXT_BANK[category][grade]) || [];
    var len  = bank.length;
    if (!len) {
      MESSAGE_SCHEDULE_CACHE[key] = [];
      return MESSAGE_SCHEDULE_CACHE[key];
    }

    var daysInYear = isLeapYear(year) ? 366 : 365;
    var rng        = makeRng(stableSeed('schedule|' + key));
    var arr        = new Array(daysInYear);
    var prev       = -1;
    var prev2      = -1;

    // 直近数日間は同じ文章を出さないためのウィンドウ
    var windowSize = 32; // だいたい1ヶ月は同じ文言を避けるイメージ
    var recent     = [];

    for (var i = 0; i < daysInYear; i++) {
      var candidate = Math.floor(rng() * len);

      if (len > 1 && candidate === prev) {
        // 直前と同じ文章を避ける
        if (len === 2) {
          candidate = 1 - prev;
        } else {
          var shift = 1 + Math.floor(rng() * (len - 1));
          candidate = (candidate + shift) % len;
        }
      }

      if (len >= 3 && i >= 2 && candidate === prev2) {
        // ABAB... のような周期パターンを弱める
        if (rng() < 0.6) {
          var shift2 = 1 + Math.floor(rng() * (len - 1));
          candidate  = (candidate + shift2) % len;
          if (candidate === prev) {
            candidate = (candidate + 1) % len;
          }
        }
      }

      // 直近 windowSize 日で使った文章をできるだけ避ける
      if (len > windowSize) {
        var guard = 0;
        while (recent.indexOf(candidate) !== -1 && guard < 8) {
          var shift3 = 1 + Math.floor(rng() * (len - 1));
          candidate  = (candidate + shift3) % len;
          guard++;
        }
      }

      arr[i] = candidate;

      recent.push(candidate);
      if (recent.length > windowSize) {
        recent.shift();
      }

      prev2 = prev;
      prev  = candidate;
    }

    MESSAGE_SCHEDULE_CACHE[key] = arr;
    return arr;
  }

  // 日付ごと・人ごとに、ある程度ばらけた文章を選ぶ
  function pickText(category, score, birthStr, date) {
    var g = gradeFromScore(score);
    var bank = (TEXT_BANK[category] && TEXT_BANK[category][g]) || [];
    if (!bank.length) return '';

    // 日付が指定されていない場合は、従来どおり単純な乱数で
    if (!date || !(date instanceof Date) || isNaN(date.getTime())) {
      var seedSimple = stableSeed('msg|' + (birthStr || '') + '|' + category + '|' + g);
      var rngSimple  = makeRng(seedSimple);
      var idxSimple  = Math.floor(rngSimple() * bank.length);
      return bank[idxSimple];
    }

    var year      = date.getFullYear();
    var schedule  = ensureMessageSchedule(birthStr, category, g, year);
    var dayIndex  = dayOfYear(date);

    if (!schedule.length || dayIndex < 0 || dayIndex >= schedule.length) {
      // 万一スケジュールがうまく取れなかった場合のフォールバック
      var dateKey = date.toISOString().slice(0, 10);
      var seed = stableSeed('msg-fallback|' + (birthStr || '') + '|' + category + '|' + g + '|' + dateKey);
      var rng  = makeRng(seed);
      var idx  = Math.floor(rng() * bank.length);
      return bank[idx];
    }

    var idxFromSchedule = schedule[dayIndex] % bank.length;
    return bank[idxFromSchedule] || '';
  }

function seasonPhrase(date, seedBase) {
    if (!date || !(date instanceof Date) || isNaN(date.getTime())) return '';
    var month = date.getMonth() + 1;
    var rng = makeRng(stableSeed('season|' + month + '|' + seedBase));
    var arr;
    if (month === 12 || month === 1 || month === 2) {
      arr = [
        "冷たい空気の中にも、静かに整える力が流れています。温かい飲み物でほっと一息つく時間を増やしてみてください。",

      ];
    } else if (month >= 3 && month <= 5) {
      arr = [
        "春の空気がゆっくりと流れ込み、気持ちも少しずつほぐれやすいタイミングです。予定の中に、小さな楽しみを混ぜてみてください。",
        "新しいことを始めたくなる季節。全部を一気に変えようとせず、「ひとつだけ試してみる」くらいがちょうど良さそうです。"
      ];
    } else if (month >= 6 && month <= 8) {
      arr = [
        "暑さで体力を奪われやすい季節。無理を通すより、こまめな休憩と水分補給を味方につけてあげてください。",
        "日差しが強いぶん、心も外に向きやすい時期。疲れを感じたら、涼しい場所で一息ついてから次の予定へ。"
      ];
    } else {
      arr = [
        "空気が少しずつ落ち着いてくる季節。ゆっくりと振り返る時間をとることで、次に進むヒントが見つかりそうです。",
        "日々の変化を感じやすい季節。小さな違いに気づくほど、明日への楽しみも増えていきます。"
      ];
    }
    var idx = Math.floor(rng() * arr.length);
    return arr[idx] || '';
  }

  function aspectScore(diff) {
    var aspects = [
      { angle: 0,   sign:  1.0 },
      { angle: 60,  sign:  0.6 },
      { angle: 120, sign:  1.0 },
      { angle: 90,  sign: -0.8 },
      { angle: 180, sign: -0.8 }
    ];
    var sigma = 35;
    var rad2 = 2 * sigma * sigma;
    var score = 0;
    for (var i = 0; i < aspects.length; i++) {
      var a = aspects[i];
      var d = Math.abs(diff - a.angle);
      if (d > 180) d = 360 - d;
      var w = Math.exp(-(d * d) / rad2);
      score += a.sign * w;
    }
    score -= 0.2435;
    return score;
  }

  function clampNorm(x) {
    if (x < -1) return -1;
    if (x >  1) return  1;
    return x;
  }

  function softenBackground(bg, negScale, posScale) {
    if (bg < 0) return bg * negScale;
    if (bg > 0) return bg * posScale;
    return bg;
  }

  function applyDayJitter(n, category, date, strength) {
    if (!date || !(date instanceof Date) || isNaN(date.getTime())) return n;
    var key = category + '|' +
      date.getFullYear() + '-' +
      (date.getMonth() + 1) + '-' +
      date.getDate();
    var rng = makeRng(stableSeed('dayJ|' + key));
    var amp = strength;
    var jitter = (rng() - 0.5) * 2 * amp;
    return clampNorm(n + jitter);
  }

  function mapNormToPercent(n, minP, maxP) {
    // n は -1〜+1 の正規化値
    if (n < -1) n = -1;
    if (n >  1) n =  1;

    // 両端を少し持ち上げるカーブ
    var z = (n < 0) ? -Math.sqrt(-n) : Math.sqrt(n);
    var mid = (minP + maxP) / 2;
    var amp = (maxP - minP) / 2;
    var p   = mid + amp * z;

    // トップクラスの日だけ 100% に丸める
    // 0.88 は「かなり良い日」だけに絞るイメージです
    if (n > 0.88) {
      p = 100;
    }

    if (p < minP) p = minP;
    if (p > 100) p = 100;
    return Math.round(p);
  }

  function parseDateInput(str) {
    if (!str) return null;
    var m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    var y  = parseInt(m[1], 10);
    var mo = parseInt(m[2], 10);
    var d  = parseInt(m[3], 10);
    if (!y || !mo || !d) return null;
    return new Date(y, mo - 1, d, 12, 0, 0);
  }

  function approxEclLon(body, date) {
    var name = String(body || '').split('.').pop();
    var table = {
      Sun:     { period: 365.2422, phase: 280.46 },
      Moon:    { period: 27.3217,  phase: 218.32 },
      Mercury: { period: 87.969,   phase: 60.75 },
      Venus:   { period: 224.701,  phase: 181.98 },
      Mars:    { period: 686.98,   phase: 355.43 },
      Jupiter: { period: 4332.59,  phase: 34.35 },
      Saturn:  { period: 10759.22, phase: 50.08 }
    };
    var cfg = table[name] || table.Sun;
    var epoch = new Date(2000, 0, 1, 12, 0, 0);
    var days = (date - epoch) / 86400000;
    var lon = (cfg.phase + (days * 360 / cfg.period)) % 360;
    if (lon < 0) lon += 360;
    return lon;
  }

  function eclLon(body, date) {
    try {
      if (typeof Astronomy !== 'undefined' && Astronomy.AstroTime && Astronomy.GeoVector && Astronomy.Ecliptic) {
        var time = new Astronomy.AstroTime(date);
        var vec  = Astronomy.GeoVector(body, time, true);
        var ecl  = Astronomy.Ecliptic(vec);
        if (typeof ecl.elon === 'number' && isFinite(ecl.elon)) return ecl.elon;
      }
    } catch (e) {
      console.warn('Astronomy fallback:', e);
    }
    return approxEclLon(body, date);
  }

  function fireConfetti() {
    var canvas = document.getElementById('confettiCanvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var w = (canvas.width  = window.innerWidth);
    var h = (canvas.height = window.innerHeight);
    var COUNT = 150;
    var confs = [];
    for (var i = 0; i < COUNT; i++) {
      confs.push({
        x: Math.random() * w,
        y: Math.random() * -h,
        vy: 2 + Math.random() * 3,
        vx: (Math.random() - 0.5) * 1.5,
        size: 4 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.2
      });
    }
    var start = performance.now();
    function loop(now) {
      var t = now - start;
      ctx.clearRect(0, 0, w, h);
      for (var i = 0; i < confs.length; i++) {
        var c = confs[i];
        c.y += c.vy;
        c.x += c.vx;
        c.rot += c.vr;
        if (c.y > h + 20) {
          c.y = -20;
          c.x = Math.random() * w;
        }
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.fillStyle = 'hsla(' + (260 + Math.random() * 40) + ',70%,70%,0.9)';
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);
        ctx.restore();
      }
      if (t < 2500) {
        requestAnimationFrame(loop);
      } else {
        ctx.clearRect(0, 0, w, h);
      }
    }
    requestAnimationFrame(loop);
  }

  function getResultSections() {
    var result = document.getElementById('result');
    if (!result || !result.innerHTML.trim()) return [];
    var titles = Array.from(result.querySelectorAll('.section-title'));
    return titles.map(function (titleEl) {

      var textEl = titleEl.nextElementSibling && titleEl.nextElementSibling.classList.contains('text-block')
        ? titleEl.nextElementSibling

      return {

        label: label ? label.textContent.trim() : titleEl.textContent.trim(),
        percent: percent ? percent.textContent.trim() : '',
        text: textEl ? textEl.textContent.trim() : ''
      };
    }).filter(function (item) { return item.label || item.text; });
  }

  function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
    var line = '';
    var lines = 0;
    text = String(text || '').replace(/\s+/g, ' ').trim();
    for (var i = 0; i < text.length; i++) {
      var test = line + text.charAt(i);
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, y);
        y += lineHeight;
        lines++;
        line = text.charAt(i);
        if (maxLines && lines >= maxLines - 1) {
          var rest = text.slice(i + 1);
          while (ctx.measureText(line + '…').width > maxWidth && line.length > 0) {
            line = line.slice(0, -1);
          }
          ctx.fillText(line + (rest ? '…' : ''), x, y);
          return y + lineHeight;
        }
      } else {
        line = test;
      }
    }
    if (line) {
      ctx.fillText(line, x, y);
      y += lineHeight;
    }
    return y;
  }

  function roundRectPath(ctx, x, y, w, h, r) {
    var rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function renderFortuneCardCanvas() {
    var sections = getResultSections();

    var grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#F6F0FF');
    grad.addColorStop(1, '#FFFFFF');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);

    ctx.fillStyle = '#7C4DFF';

    var y = 178;

      ctx.fillStyle = '#7C4DFF';

        ctx.textAlign = 'right';
        ctx.fillText(s.percent, 990, y + 48);
        ctx.textAlign = 'left';
      }

      ctx.fillStyle = '#4D485C';
      ctx.font = '400 28px -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif';
      drawWrappedText(ctx, s.text, 88, y + 88, 880, 39, idx === 0 ? 3 : 2);
      y += boxH + 18;
    });

    ctx.fillStyle = '#9A91AD';
    ctx.font = '400 22px -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif';
    ctx.fillText('Mothership / A massage to you!', 70, 1032);
    return canvas;
  }

  function calc() {
    try {
      var birthStr  = document.getElementById('birth').value;
      var targetStr = document.getElementById('targetDate').value;

      if (!birthStr) {
        alert('生年月日を入力してください。');
        return;
      }
      var birthDate = parseDateInput(birthStr);
      if (!birthDate) {
        alert('生年月日の形式が正しくありません。');
        return;
      }

      var now = new Date();
      var targetDate = parseDateInput(targetStr);
      if (!targetDate) {
        targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
      }

      var targetKey =
        targetDate.getFullYear() + '-' +
        (targetDate.getMonth() + 1) + '-' +
        targetDate.getDate();
      var seedBase = birthStr + '|' + targetKey;

      var Body = (typeof Astronomy !== 'undefined' && Astronomy.Body) ? Astronomy.Body : {
        Sun: 'Sun',
        Moon: 'Moon',
        Mercury: 'Mercury',
        Venus: 'Venus',
        Mars: 'Mars',
        Jupiter: 'Jupiter',
        Saturn: 'Saturn'
      };
      var Sun  = Body.Sun;
      var Moon = Body.Moon;
      var Merc = Body.Mercury;
      var Ven  = Body.Venus;
      var Mars = Body.Mars;
      var Jup  = Body.Jupiter;
      var Sat  = Body.Saturn;

      var bodies = [Sun, Moon, Merc, Ven, Mars, Jup, Sat];

      var nat = {};
      for (var i = 0; i < bodies.length; i++) {
        var b = bodies[i];
        nat[b] = eclLon(b, birthDate);
      }

      function computeNormsForDate(date) {
        var cur = {};
        for (var i = 0; i < bodies.length; i++) {
          var b = bodies[i];
          cur[b] = eclLon(b, date);
        }
        function diffLonLocal(body) {
          var d = cur[body] - nat[body];
          d = d % 360;
          if (d < 0) d += 360;
          return d;
        }
        function ALocal(body) {
          return aspectScore(diffLonLocal(body));
        }

        var rawBgTotal =
          0.25 * ALocal(Jup) +
          0.20 * ALocal(Sat) +
          0.20 * ALocal(Sun);
        var rawFastTotal =
          1.5 * ALocal(Moon) +
          1.1 * ALocal(Merc) +
          1.1 * ALocal(Ven)  +
          1.2 * ALocal(Mars);

        var nBgTotal   = clampNorm(rawBgTotal   * 0.40);
        var nFastTotal = clampNorm(rawFastTotal * 0.45);
        nBgTotal = softenBackground(nBgTotal, 0.4, 0.4);
        var nTotalPlanet = clampNorm(nFastTotal * 0.95 + nBgTotal * 0.05);

        var rawBgLove =
          0.35 * ALocal(Jup);
        var rawFastLove =
          1.6 * ALocal(Ven) +
          1.4 * ALocal(Moon) +
          0.9 * ALocal(Merc);

        var nBgLove   = clampNorm(rawBgLove   * 0.45);
        var nFastLove = clampNorm(rawFastLove * 0.45);
        nBgLove = softenBackground(nBgLove, 0.4, 0.4);
        var nLovePlanet = clampNorm(nFastLove * 0.95 + nBgLove * 0.05);

        var rawBgMoney =
          0.45 * ALocal(Jup) +
          0.30 * ALocal(Sat);
        var rawFastMoney =
          1.0 * ALocal(Ven) +
          0.8 * ALocal(Mars) +
          0.6 * ALocal(Merc);

        var nBgMoney   = clampNorm(rawBgMoney   * 0.35);
        var nFastMoney = clampNorm(rawFastMoney * 0.45);
        nBgMoney = softenBackground(nBgMoney, 0.4, 0.4);
        var nMoneyPlanet = clampNorm(nFastMoney * 0.95 + nBgMoney * 0.05);

        var rawBgWork =
          0.50 * ALocal(Sat);
        var rawFastWork =
          1.1 * ALocal(Mars) +
          0.9 * ALocal(Merc) +
          0.5 * ALocal(Moon) +
          0.4 * ALocal(Sun);

        var nBgWork   = clampNorm(rawBgWork   * 0.45);
        var nFastWork = clampNorm(rawFastWork * 0.45);
        nBgWork = softenBackground(nBgWork, 0.4, 0.4);
        var nWorkPlanet = clampNorm(nFastWork * 0.95 + nBgWork * 0.05);

        var rawBgHealth =
          0.30 * ALocal(Jup);
        var rawFastHealth =
          1.3 * ALocal(Moon) +
          0.7 * ALocal(Sun) +
          0.4 * ALocal(Ven);

        var nBgHealth   = clampNorm(rawBgHealth   * 0.45);
        var nFastHealth = clampNorm(rawFastHealth * 0.45);
        nBgHealth = softenBackground(nBgHealth, 0.4, 0.4);
        var nHealthPlanet = clampNorm(nFastHealth * 0.95 + nBgHealth * 0.05);

        return {
          total:  nTotalPlanet,
          love:   nLovePlanet,
          money:  nMoneyPlanet,
          work:   nWorkPlanet,
          health: nHealthPlanet
        };
      }

      var todayNorms = computeNormsForDate(targetDate);

      // --- 年内（±90日）での位置づけ ---
      var yearStats = {
        total:  { sum: 0, min:  9999, max: -9999, count: 0 },
        love:   { sum: 0, min:  9999, max: -9999, count: 0 },
        money:  { sum: 0, min:  9999, max: -9999, count: 0 },
        work:   { sum: 0, min:  9999, max: -9999, count: 0 },
        health: { sum: 0, min:  9999, max: -9999, count: 0 }
      };

      for (var oy = -90; oy <= 90; oy += 3) {
        var dYear = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
        dYear.setDate(dYear.getDate() + oy);
        var ny = computeNormsForDate(dYear);

        yearStats.total.sum   += ny.total;
        yearStats.total.min    = Math.min(yearStats.total.min,  ny.total);
        yearStats.total.max    = Math.max(yearStats.total.max,  ny.total);
        yearStats.total.count += 1;

        yearStats.love.sum    += ny.love;
        yearStats.love.min     = Math.min(yearStats.love.min,   ny.love);
        yearStats.love.max     = Math.max(yearStats.love.max,   ny.love);
        yearStats.love.count  += 1;

        yearStats.money.sum   += ny.money;
        yearStats.money.min    = Math.min(yearStats.money.min,  ny.money);
        yearStats.money.max    = Math.max(yearStats.money.max,  ny.money);
        yearStats.money.count += 1;

        yearStats.work.sum    += ny.work;
        yearStats.work.min     = Math.min(yearStats.work.min,   ny.work);
        yearStats.work.max     = Math.max(yearStats.work.max,   ny.work);
        yearStats.work.count  += 1;

        yearStats.health.sum  += ny.health;
        yearStats.health.min   = Math.min(yearStats.health.min, ny.health);
        yearStats.health.max   = Math.max(yearStats.health.max, ny.health);
        yearStats.health.count+= 1;
      }

      function yearNorm(valueToday, stat) {
        if (!stat || stat.count <= 1) return 0;
        var mean = stat.sum / stat.count;
        var halfRange = (stat.max - stat.min) / 2;
        if (halfRange < 0.05) return 0;
        var n = (valueToday - mean) / halfRange;
        return clampNorm(n);
      }

      var nTotalGlobal  = yearNorm(todayNorms.total,  yearStats.total);
      var nLoveGlobal   = yearNorm(todayNorms.love,   yearStats.love);
      var nMoneyGlobal  = yearNorm(todayNorms.money,  yearStats.money);
      var nWorkGlobal   = yearNorm(todayNorms.work,   yearStats.work);
      var nHealthGlobal = yearNorm(todayNorms.health, yearStats.health);

      // --- 近傍（±16日）のローカル比較 ---
      var windowDays = 16;
      var sum  = { total:0, love:0, money:0, work:0, health:0 };
      var sum2 = { total:0, love:0, money:0, work:0, health:0 };
      var count = 0;

      for (var offset = -windowDays; offset <= windowDays; offset++) {
        var d = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
        d.setDate(d.getDate() + offset);
        var n = computeNormsForDate(d);
        sum.total  += n.total;   sum2.total  += n.total  * n.total;
        sum.love   += n.love;    sum2.love   += n.love   * n.love;
        sum.money  += n.money;   sum2.money  += n.money  * n.money;
        sum.work   += n.work;    sum2.work   += n.work   * n.work;
        sum.health += n.health;  sum2.health += n.health * n.health;
        count++;
      }

      function localFromWindow(valueToday, s, s2) {
        if (count <= 1) return 0;
        var mean = s / count;
        var variance = s2 / count - mean * mean;
        if (variance < 1e-6) return 0;
        var std = Math.sqrt(variance);
        if (std < 0.05) return 0;
        var z = (valueToday - mean) / (2 * std);
        return clampNorm(z);
      }

      var nTotalLocal  = localFromWindow(todayNorms.total,  sum.total,  sum2.total);
      var nLoveLocal   = localFromWindow(todayNorms.love,   sum.love,   sum2.love);
      var nMoneyLocal  = localFromWindow(todayNorms.money,  sum.money,  sum2.money);
      var nWorkLocal   = localFromWindow(todayNorms.work,   sum.work,   sum2.work);
      var nHealthLocal = localFromWindow(todayNorms.health, sum.health, sum2.health);

      function mix(global, local) {
        if (local === 0) {
          return clampNorm(global);
        }
        var g = 0.25 * global + 0.75 * local;
        return clampNorm(g);
      }

      var nTotal  = mix(nTotalGlobal,  nTotalLocal);
      var nLove   = mix(nLoveGlobal,   nLoveLocal);
      var nMoney  = mix(nMoneyGlobal,  nMoneyLocal);
      var nWork   = mix(nWorkGlobal,   nWorkLocal);
      var nHealth = mix(nHealthGlobal, nHealthLocal);

      nTotal  = applyDayJitter(nTotal,  'total',  targetDate, 0.18);
      nLove   = applyDayJitter(nLove,   'love',   targetDate, 0.18);
      nMoney  = applyDayJitter(nMoney,  'money',  targetDate, 0.18);
      nWork   = applyDayJitter(nWork,   'work',   targetDate, 0.18);
      nHealth = applyDayJitter(nHealth, 'health', targetDate, 0.18);

      var total  = mapNormToPercent(nTotal,  15, 95);
      var love   = mapNormToPercent(nLove,   15, 95);
      var money  = mapNormToPercent(nMoney,  15, 95);
      var work   = mapNormToPercent(nWork,   15, 95);
      var health = mapNormToPercent(nHealth, 15, 95);

      var overallText = pickText('total',  total,  birthStr,  targetDate);
      var loveText    = pickText('love',   love,   birthStr,  targetDate);
      var moneyText   = pickText('money',  money,  birthStr,  targetDate);
      var workText    = pickText('work',   work,   birthStr,  targetDate);
      var healthText  = pickText('health', health, birthStr,  targetDate);
      var seasonText  = seasonPhrase(targetDate, seedBase);

      var html = '';

      html += '<div class="section-title">' +
                '<span class="icon">🪐</span>' +
                '<span class="label">今日の総合運</span>' +
                '<span class="percent">' + total + '%</span>' +
              '</div>';
      var totalBlock = overallText;
      if (seasonText) {
        totalBlock += ' ' + seasonText;
      }
      html += '<div class="text-block">' + totalBlock + '</div>';

      html += '<div class="section-title">' +
                '<span class="icon">💞</span>' +
                '<span class="label">恋愛</span>' +
                '<span class="percent">' + love + '%</span>' +
              '</div>';
      html += '<div class="text-block">' + loveText + '</div>';

      html += '<div class="section-title">' +
                '<span class="icon">💼</span>' +
                '<span class="label">仕事</span>' +
                '<span class="percent">' + work + '%</span>' +
              '</div>';
      html += '<div class="text-block">' + workText + '</div>';

      html += '<div class="section-title">' +
                '<span class="icon">💰</span>' +
                '<span class="label">金運</span>' +
                '<span class="percent">' + money + '%</span>' +
              '</div>';
      html += '<div class="text-block">' + moneyText + '</div>';

      html += '<div class="section-title">' +
                '<span class="icon">💗</span>' +
                '<span class="label">健康</span>' +
                '<span class="percent">' + health + '%</span>' +
              '</div>';
      html += '<div class="text-block">' + healthText + '</div>';

      var resultEl = document.getElementById('result');
      if (resultEl) {
        resultEl.innerHTML = html;
      }

      var saveBtn = document.getElementById('saveBtn');
      if (saveBtn) {
        saveBtn.style.display = EMBED_MODE ? 'none' : 'block';
      }

      var birthdayEl = document.getElementById('birthdayMessage');
      if (birthdayEl) {
        birthdayEl.textContent = '';
      }

      var now2 = new Date();
      var isTodayTarget =
        targetDate.getFullYear() === now2.getFullYear() &&
        targetDate.getMonth()    === now2.getMonth() &&
        targetDate.getDate()     === now2.getDate();

      var isTodayBirthday =
        birthDate.getMonth() === now2.getMonth() &&
        birthDate.getDate()  === now2.getDate();

      if (isTodayTarget && isTodayBirthday) {
        if (birthdayEl) {
          birthdayEl.textContent =
            '🎂 お誕生日おめでとうございます。今日のあなたに、やさしい流れがありますように。';
        }
        fireConfetti();
      }
    } catch (e) {
      console.error('calc error:', e);
      alert('内部エラーが発生しました（コンソールに詳細が出ています）。');
    }
  }

  window.calc = calc;
  window.saveResultImage = saveResultImage;
  window.__mothershipGetAsset = async function (options) {
    var result = document.getElementById('result');
    var shouldAutoCalc = !options || options.autoCalc !== false;
    if (result && !result.innerHTML.trim() && shouldAutoCalc && typeof calc === 'function') {
      calc();
      await new Promise(function (resolve) { setTimeout(resolve, 180); });
    }
    result = document.getElementById('result');
    if (!result || !result.innerHTML.trim()) return null;
    var targetStr = document.getElementById('targetDate').value || 'today';
    var canvas = await captureResultCanvas();
    if (!canvas) return null;
    var imageData = canvas.toDataURL('image/jpeg', 0.92);
    return { kind: 'image', imageData, title: '100％星占い', note: targetStr };
  };

})(); 
</script>
